name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re-)release (e.g. v2.2.1). Must already exist.'
        required: true

permissions:
  contents: write   # required to create / upload release assets

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: go vet ./...
      - run: go test ./... -race -count=1

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Resolve version string
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          OUT="yoyo-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${{ steps.ver.outputs.tag }}" \
            -o "${OUT}" ./cmd/yoyo
          file "${OUT}"
          ls -la "${OUT}"

      - uses: actions/upload-artifact@v4
        with:
          name: yoyo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: yoyo-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve tag + version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"          >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"  >> "$GITHUB_OUTPUT"

      - name: Generate SHA-256 checksums
        working-directory: dist
        run: |
          chmod +x yoyo-*
          sha256sum yoyo-* > checksums.txt
          echo "--- checksums.txt ---"
          cat checksums.txt

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\["v"\\]"       { flag=1; next }
            flag && /^## \[/             { exit }
            flag                          { print }
          ' CHANGELOG.md > release-notes.md
          echo "--- release-notes.md ---"
          cat release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No matching section found for ${VERSION} — falling back to tag summary."
            echo "See [CHANGELOG.md](CHANGELOG.md) for full history." > release-notes.md
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: release-notes.md
          files: |
            dist/yoyo-linux-amd64
            dist/yoyo-linux-arm64
            dist/yoyo-darwin-amd64
            dist/yoyo-darwin-arm64
            dist/checksums.txt
            install.sh
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
