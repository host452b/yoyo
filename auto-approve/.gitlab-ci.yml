stages:
  - build
  - publish

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo

.rust_template:
  before_script:
    - rustc --version
    - cargo --version
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - target/

build:linux-x86_64:
  extends: .rust_template
  image: ghcr.io/rust-cross/rust-musl-cross:x86_64-musl
  stage: build
  script:
    - cargo build --release --target x86_64-unknown-linux-musl
    - mv target/x86_64-unknown-linux-musl/release/aaa aaa-linux-x86_64
  artifacts:
    paths:
      - aaa-linux-x86_64
    expire_in: 1 day

build:linux-aarch64:
  extends: .rust_template
  image: ghcr.io/rust-cross/rust-musl-cross:aarch64-musl
  stage: build
  script:
    - cargo build --release --target aarch64-unknown-linux-musl
    - mv target/aarch64-unknown-linux-musl/release/aaa aaa-linux-aarch64
  artifacts:
    paths:
      - aaa-linux-aarch64
    expire_in: 1 day

build:macos-x86_64:
  extends: .rust_template
  image: joseluisq/rust-linux-darwin-builder:latest
  stage: build
  variables:
    CC: o64-clang
    CXX: o64-clang++
    CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER: o64-clang
  script:
    - cargo build --release --target x86_64-apple-darwin
    - mv target/x86_64-apple-darwin/release/aaa aaa-macos-x86_64
  artifacts:
    paths:
      - aaa-macos-x86_64
    expire_in: 1 day

build:macos-aarch64:
  extends: .rust_template
  image: joseluisq/rust-linux-darwin-builder:latest
  stage: build
  variables:
    CC: oa64-clang
    CXX: oa64-clang++
    CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER: oa64-clang
  script:
    - cargo build --release --target aarch64-apple-darwin
    - mv target/aarch64-apple-darwin/release/aaa aaa-macos-aarch64
  artifacts:
    paths:
      - aaa-macos-aarch64
    expire_in: 1 day

build:windows-x86_64:
  extends: .rust_template
  image: rust:latest
  stage: build
  script:
    - apt-get update && apt-get install -y gcc-mingw-w64-x86-64
    - rustup target add x86_64-pc-windows-gnu
    - cargo build --release --target x86_64-pc-windows-gnu
    - mv target/x86_64-pc-windows-gnu/release/aaa.exe aaa-windows-x86_64.exe
  artifacts:
    paths:
      - aaa-windows-x86_64.exe
    expire_in: 1 day

publish:
  stage: publish
  image: curlimages/curl:latest
  only:
    - tags
  dependencies:
    - build:linux-x86_64
    - build:linux-aarch64
    - build:macos-x86_64
    - build:macos-aarch64
    - build:windows-x86_64
  script:
    - |
      for binary in aaa-*; do
        echo "Publishing $binary..."
        curl --header "JOB-TOKEN: $CI_JOB_TOKEN" \
             --upload-file "$binary" \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/aaa/${CI_COMMIT_TAG}/$binary"
      done
